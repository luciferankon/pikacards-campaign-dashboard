name: Daily Instagram Reel Poster

on:
  schedule:
    # Run daily at 9:00 AM AEST (11:00 PM UTC the previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no actual posts)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Run Instagram Reel Poster
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          CAMPAIGN_SHEET_ID: '1O_h1tb6jvB1yXCb8fpUUh3s1teZlZydq4pxSucsok4w'
          INSTAGRAM_BUSINESS_ACCOUNT_ID: '17841474550556991'
          FACEBOOK_PAGE_ID: '1253807941139935'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python scripts/instagram_poster.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: instagram-poster-logs
          path: instagram_poster.log
          retention-days: 7

      - name: Post job summary
        if: always()
        run: |
          if [ -f instagram_poster.log ]; then
            echo "## Instagram Reel Posting Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Execution Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 instagram_poster.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
