name: Daily Instagram Reel Poster

on:
  workflow_dispatch:
    inputs:
      video_drive_id:
        description: 'Google Drive file ID of the video to post'
        required: true
        type: string
      caption:
        description: 'Instagram post caption'
        required: true
        type: string
      hashtags:
        description: 'Hashtags to append to the caption'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Run in dry-run mode (no actual posts)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Instagram Reel Poster
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: '17841474550556991'
          VIDEO_DRIVE_ID: ${{ inputs.video_drive_id }}
          CAPTION: ${{ inputs.caption }}
          HASHTAGS: ${{ inputs.hashtags }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python scripts/instagram_poster.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-poster-logs
          path: instagram_poster.log
          retention-days: 7

      - name: Post job summary
        if: always()
        run: |
          if [ -f instagram_poster.log ]; then
            echo "## Instagram Reel Posting Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Execution Log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 instagram_poster.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
